<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #6ec1c2, #5aa9aa);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        .login-container h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .input-group label {
            font-size: 14px;
            color: #555;
        }

        .input-group input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #007bff;
        }

        .btn {
            width: 100%;
            padding: 10px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #0056b3;
        }

        .register {
            margin-top: 15px;
            font-size: 14px;
        }

        .register a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .register a:hover {
            text-decoration: underline;
        }

        .error-box {
            margin-top: 10px;
            padding: 8px;
            background: #f8d7da;
            color: #842029;
            border-radius: 5px;
            font-size: 13px;
            display: none; /* ativa depois via backend */
        }

    </style>
</head>
<body>

<div class="login-container">
    <h1>Login</h1>

    <form action="/logar" method="POST">

        <div class="input-group">
            <label>E-mail</label>
            <input type="email" name="email" placeholder="Digite seu e-mail" required>
        </div>

        <div class="input-group">
            <label>Senha</label>
            <input type="password" name="password" placeholder="Digite sua senha" required>
        </div>

        <button class="btn" type="submit">Entrar</button>

    </form>

    <div class="register">
        <a href="/cadastro">Registrar-se</a>
    </div>

    <div class="error-box">
        Usuário ou senha inválidos
    </div>

</div>

<script>
    if (document.cookie.includes("user=")) {
        window.location.href = "/";
    }
</script>

</body>
</html>
